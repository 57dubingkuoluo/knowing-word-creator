<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>儿童识字小报生成器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>儿童识字小报生成器</h1>
      <p class="subtitle">选择主题，生成专属识字小报</p>
    </header>

    <main class="main">
      <!-- API Key 设置 -->
      <section class="section api-section">
        <h2>API 设置</h2>
        <div class="api-key-wrapper">
          <input type="text" id="apiKey" class="input" placeholder="输入 API Key" />
          <button id="saveApiKey" class="btn btn-secondary">保存</button>
          <span id="apiKeyDisplay" class="api-key-display" style="display: none;"></span>
        </div>
      </section>

      <!-- 主题选择 -->
      <section class="section theme-section">
        <h2>选择主题</h2>

        <div class="mode-toggle">
          <label class="checkbox-label">
            <input type="checkbox" id="customMode" />
            <span>自定义主题</span>
          </label>
        </div>

        <div id="themeOptions" class="preset-grid"></div>

        <div class="custom-inputs">
          <input type="text" id="customTheme" class="input" placeholder="输入主题/场景（如：超市、医院）" style="display: none;" />
          <input type="text" id="customTitle" class="input" placeholder="输入标题（如：走进超市）" style="display: none;" />
        </div>
      </section>

      <!-- 生成按钮 -->
      <section class="section action-section">
        <button id="generateBtn" class="btn btn-primary btn-large">生成图片</button>
        <p id="statusText" class="status-text"></p>
      </section>

      <!-- 结果展示 -->
      <section id="resultContainer" class="section result-section" style="display: none;">
        <h2>生成结果</h2>
        <div class="result-wrapper">
          <img id="resultImage" class="result-image" alt="生成的识字小报" />
        </div>
        <button id="resetBtn" class="btn btn-secondary">重新生成</button>
      </section>
    </main>

    <footer class="footer">
      <p>Powered by Nano Banana Pro</p>
    </footer>
  </div>

  <script src="js/presets.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
